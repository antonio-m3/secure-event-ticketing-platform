# =============================================================================
# Secure Event Ticketing Platform — local developer stack
# -----------------------------------------------------------------------------
# Works with Docker Compose v2 (`docker compose ...`) and Podman Compose.
#
#   cp .env.example .env
#   docker compose up --build -d
#   docker compose ps
#
# Network segmentation (defence in depth):
#   web-tier  : frontend  <-> api            (public-facing traffic)
#   data-tier : api, worker <-> postgres, redis  (private data plane)
# The frontend is ONLY on web-tier, so it physically cannot reach the database
# or Redis. Postgres/Redis are ONLY on data-tier, never exposed to the web tier.
# =============================================================================

name: secure-event-ticketing

services:
  # ---------------------------------------------------------------------------
  # Frontend — Express static server. Web tier only.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      target: dev            # hot-reload image for local development
    image: ticketing-frontend:dev
    env_file: .env
    environment:
      NODE_ENV: development
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      # Browser-facing API URL (served via /config). Host-reachable on purpose.
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src:ro   # mount source for nodemon hot reload
    networks:
      - web-tier
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — REST service. Bridges web tier and data tier.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Containerfile
      target: dev
    image: ticketing-api:dev
    env_file: .env
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./api/src:/app/src:ro
    networks:
      - web-tier
      - data-tier
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Worker — queue consumer. Data tier only (no inbound HTTP).
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Containerfile
      target: dev
    image: ticketing-worker:dev
    env_file: .env
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./worker/src:/app/src:ro
    networks:
      - data-tier
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node src/worker.js' > /dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent order store. Data tier only.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Schema bootstrap — applied only on first init of an empty data volume.
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data-tier
    # No host port published by default — keep the DB private. Uncomment to
    # connect with a local client during debugging:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing_user} -d ${POSTGRES_DB:-ticketing}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — queue / cache layer. Data tier only.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    networks:
      - data-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  web-tier:
    driver: bridge
  data-tier:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
