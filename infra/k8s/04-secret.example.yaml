# =============================================================================
# EXAMPLE Secret — DO NOT COMMIT REAL VALUES.
# -----------------------------------------------------------------------------
# Copy to 04-secret.yaml (git-ignored) and replace the placeholders, or better,
# create it imperatively so secrets never touch the repo:
#
#   kubectl -n ticketing create secret generic ticketing-secret \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)"
#
# In production, prefer a managed solution: Sealed Secrets, External Secrets
# Operator, HashiCorp Vault, or the cloud provider's secret manager.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secret
  namespace: ticketing
  labels:
    app.kubernetes.io/part-of: secure-event-ticketing
type: Opaque
stringData:
  # PLACEHOLDERS ONLY — replace before applying. Never commit real secrets.
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_LONG_RANDOM_STRING"
  # DATABASE_URL is composed from the values above; keep it consistent.
  DATABASE_URL: "postgresql://ticketing_user:REPLACE_WITH_STRONG_PASSWORD@postgres:5432/ticketing"
