apiVersion: v1
kind: LimitRange
metadata:
  name: ticketing-limits
  namespace: ticketing
  labels:
    app.kubernetes.io/part-of: secure-event-ticketing
spec:
  limits:
    # Default requests/limits applied to any container that omits them, plus
    # an upper bound per container so a single pod cannot grab the whole quota.
    - type: Container
      default:
        cpu: "500m"
        memory: 256Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: "10m"
        memory: 32Mi
